services:
  web:
    image: 192.168.0.222:5050/itdefence-web:latest
    container_name: itdefence-web
    restart: unless-stopped
    ports:
      - "7979:80"          # внешний порт 7979 → Nginx 80 внутри
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
