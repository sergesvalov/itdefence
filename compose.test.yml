services:
  web-test:
    image: 192.168.10.222:5050/itdefence-web:latest
    container_name: itdefence-web-test
    restart: unless-stopped
    ports:
      - "7373:80"          # тестовый порт 7373 → Nginx 80 внутри
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
