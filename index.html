<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Enikey Defense – Save Petya from the Tasks!</title>
    <meta name="description" content="A funny tower-defense game set in a corporate office. Help Petya fend off coworkers bringing task-tickets!" />
    <script>
      // Force unregister all service workers and clear CacheStorage
      // to prevent localhost cache poisoning from other projects
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let r of registrations) r.unregister();
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        width: 100vw;
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        /* Let Phaser handle centering via autoCenter: Phaser.Scale.CENTER_BOTH */
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        box-shadow: 0 0 60px rgba(100,200,255,0.15), 0 0 20px rgba(0,0,0,0.8);
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
